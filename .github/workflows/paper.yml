name: paper-session
on:
  workflow_dispatch:
    inputs:
      minutes:
        description: 'run length in minutes'
        default: '330'
        required: false
  schedule:
    - cron: '15 */6 * * *'
permissions:
  contents: write
concurrency:
  group: paper-session
  cancel-in-progress: false
jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: run session with 10-min auto-commit (carryover from committed results.json)
        run: |
          git config user.name "paper-bot"
          git config user.email "actions@users.noreply.github.com"
          python3 paper_bot.py "${{ github.event.inputs.minutes || '330' }}" &
          BOT=$!
          while kill -0 $BOT 2>/dev/null; do
            sleep 600
            git pull --rebase --autostash || true
            git add -A paper_log.jsonl results.json 2>/dev/null || true
            git commit -m "auto: live results update" || true
            git push || true
          done
          wait $BOT || true
          git pull --rebase --autostash || true
          git add -A paper_log.jsonl results.json 2>/dev/null || true
          git commit -m "session final" || true
          git push || true
      - name: summary
        if: always()
        run: cat results.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paper-log-${{ github.run_id }}
          path: |
            paper_log.jsonl
            results.json
          if-no-files-found: ignore
